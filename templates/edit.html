{% extends "layout.html" %}

{% block title %}
    Edit Application
{% endblock %}

{% block main %}
    <h1>Edit Application</h1>
    
    <form action="/edit/{{ application['id'] }}" method="post">
        <div class="mb-3">
            <label for="company" class="form-label">Company</label>
            <input type="text" class="form-control" id="company" name="company" value="{{ application['company'] }}" required>
        </div>

        <div class="mb-3">
            <label for="job_title" class="form-label">Job Title</label>
            <input type="text" class="form-control" id="job_title" name="job_title" value="{{ application['job_title'] }}" required>
        </div>

        <div class="mb-3">
            <label for="salary" class="form-label">Salary</label>
            <input type="number" class="form-control" id="salary" name="salary" value="{{ application['salary'] or '' }}">
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <select class="form-control" id="category" name="category" required>
                {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="deadline" class="form-label">Deadline</label>
            <input type="date" class="form-control" id="deadline" name="deadline" value="{{ application['deadline'] or '' }}">
        </div>

        <div class="mb-3">
            <label for="link" class="form-label">Link</label>
            <input type="url" class="form-control" id="link" name="link" value="{{ application['link'] or '' }}">
        </div>

        <button class="btn btn-primary" type="submit">Save</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
