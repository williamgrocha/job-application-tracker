{% extends "layout.html" %}

{% block title %}
    Edit Application
{% endblock %}

{% block main %}
    <h1 class="mb-4">Edit Application</h1>
    
    <div class="container">
        <form action="/edit/{{ application['id'] }}" method="post" class="text-start">
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="company" class="form-label">Company</label>
                    <input type="text" class="form-control" id="company" name="company" value="{{ application['company'] }}" required>
                </div>
                <div class="col-md-6">
                    <label for="job_title" class="form-label">Job Title</label>
                    <input type="text" class="form-control" id="job_title" name="job_title" value="{{ application['job_title'] }}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4 input-icon-wrapper salary-box">
                    <label for="salary" class="currency-prefix">R$</label>
                    <input type="number" class="form-control" id="salary" name="salary" value="{{ application['salary'] or '' }}">
                </div>
                <div class="col-md-4 ">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-control" id="category" name="category" required>
                        {% for cat in categories %}
                            <option value="{{ cat }}"
                            {% if cat == application['category'] %}
                            selected
                            {% endif %}>
                                {{ cat }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="deadline" class="form-label">Deadline</label>
                    <input type="date" class="form-control" id="deadline" name="deadline" value="{{ application['deadline'] or '' }}">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-12">
                    <label for="link" class="form-label">Link</label>
                    <input type="url" class="form-control" id="link" name="link" value="{{ application['link'] or '' }}">
                </div>
            </div>

            <div class="text-center">
                <button class="btn btn-primary" type="submit">Save Changes</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
            
        </form>
    </div>
{% endblock %}
