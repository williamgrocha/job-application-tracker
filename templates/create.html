{% extends "layout.html" %}

{% block title %}
    Add Application
{% endblock %}

{% block main %}
    <section class="create-page">
        <div class="create-header text-start">
            <h1 class="create-title mb-2">Add a new application</h1>
            <p class="create-subtitle mb-0">Track every opportunity in one place. Start with the essentials and update details later.</p>
        </div>

        <div class="create-card mt-4">
            <form action="/create" method="post" class="create-form text-start">
                <div class="row g-3 mb-1">
                    <div class="col-md-6">
                        <label for="company" class="form-label">Company <span class="required-dot">*</span></label>
                        <input type="text" class="form-control" id="company" name="company" placeholder="e.g. Nubank" required>
                    </div>
                    <div class="col-md-6">
                        <label for="job_title" class="form-label">Job title <span class="required-dot">*</span></label>
                        <input type="text" class="form-control" id="job_title" name="job_title" placeholder="e.g. Backend Engineer" required>
                    </div>
                </div>

                <div class="row g-3 mb-1">
                    <div class="col-md-4">
                        <label for="salary" class="form-label">Salary (optional)</label>
                        <div class="input-icon-wrapper salary-box">
                            <span class="currency-prefix">R$</span>
                            <input type="number" class="form-control salary-input" id="salary" placeholder="0,00" name="salary" min="0" step="0.01">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label for="category" class="form-label">Category <span class="required-dot">*</span></label>
                        <select class="form-control" id="category" name="category" required>
                            <option value="" disabled selected>Select a category</option>
                            {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label for="deadline" class="form-label">Deadline (optional)</label>
                        <input type="text"
                        class="form-control"
                        id="deadline"
                        name="deadline"
                        placeholder="Select a date"
                        onfocus="this.type='date'"
                        onblur="if(!this.value){this.type='text'}">
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label for="link" class="form-label">Application link (optional)</label>
                        <input type="url" class="form-control" id="link" name="link" placeholder="https://company.com/jobs/role">
                    </div>
                </div>

                <div class="create-actions">
                    <button class="btn btn-primary" type="submit">Save application</button>
                    <a href="/" class="btn btn-secondary">Back to menu</a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
