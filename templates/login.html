{% extends "layout.html" %}

{% block title %}
    Login
{% endblock %}

{% block main %}

    <h1 class="mb-4">Login</h1>
    <form method="POST" class="mx-auto" style="max-width: 400px;">
        <div class="mb-3 text-start">
            <label for="username" class="form-label" autofocus autocomplete="off">Username</label>
            <input autofocus autocomplete="off" type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3 text-start">
            <label for="password" class="form-label" autocomplete="off">Password</label>
            <input type="password" autocomplete="off" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3 d-flex justify-content-end align-items-center gap-3">
            <a class="create-account text-decoration-none text-secondary text-nowrap" href="/register">Create account</a>
            <button type="submit" class="btn btn-primary px-4">Login</button>
        </div>
    </form>

{% endblock %}
