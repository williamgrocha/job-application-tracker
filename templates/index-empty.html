{% extends "layout.html" %}

{% block title %}
    Hello, {{ username }}!
{% endblock %}

{% block body_class %}no-scroll{% endblock %}

{% block main %}
    <h3 class="mb-4 text-start">Hello {{ username }}!</h3>
    <div class="empty-state-container">
        <div class="empty-state-card">
            <div class="icon-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <h2>No applications yet</h2>
            <p>Keep your job search organized. Add your first application to start tracking your progress.</p>
            <form action="/create" method="GET">
                <button class="btn-primary" type="submit">
                    <span>+</span> Add first application
                </button>
            </form>
        </div>
    </div>
{% endblock %}
