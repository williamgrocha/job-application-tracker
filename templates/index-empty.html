<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <!-- http://getbootstrap.com/docs/5.3/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <link href="/static/favicon.ico" rel="icon">

        <link href="/static/styles.css" rel="stylesheet">

        <title>New Application</title>

    </head>

    <body id="static">

        <nav class="bg-light border navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="/"><span>Job Application Tracker</span></a>
                <div class="d-flex">
                    {% if not session['user_id'] %}
                    <ul class="navbar-nav d-flex flex-row gap-3">
                        <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                        <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
                    </ul>
                    {% else %}
                    <ul class="navbar-nav d-flex flex-row gap-3">
                        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                    </ul>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main>
    <div class="empty-state-container">
        <div class="empty-state-card">
            <div class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <h2>No applications yet</h2>
            <p>Keep your job search organized. Add your first application to start tracking your progress.</p>
            <form action="/create" method="GET"><button class="btn-primary">
                <span>+</span> Add first application</button><form>
            </div>
        </div>
        </main>

        <footer class="mb-5">
        </footer>

    </body>

</html>
