{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}

    <h1 class="mb-4">Register</h1>
    <form method="POST" class="mx-auto" style="max-width: 400px;">
        <div class="mb-3 text-start">
            <label for="username" class="form-label" autofocus autocomplete="off">Username</label>
            <input autofocus autocomplete="off" type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3 text-start">
            <label for="password" class="form-label">Password</label>
            <input type="password" autocomplete="off" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3 text-start">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" autocomplete="off" class="form-control" id="confirmation" name="confirmation" required>
        </div>
                <div class="mb-3 d-flex justify-content-end align-items-center gap-3">
            <a class="create-account text-decoration-none text-secondary text-nowrap" href="/login">Already have an account?</a>
            <button type="submit" class="btn btn-primary px-4">Register</button>
        </div>
    </form>

{% endblock %}
